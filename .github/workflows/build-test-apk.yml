name: Build Test APKs

on:
  push:
    branches:
      - master
      - 'feature/**'
      - 'tsa/**'
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    name: Build Debug APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APKs (Mobile)
        env:
          NO_GS: true
        run: ./gradlew fermata:assembleMobileDebug

      - name: Build Debug APKs (Auto)
        env:
          NO_GS: true
        run: ./gradlew fermata:assembleAutoDebug

      - name: Upload Mobile Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fermata-mobile-debug
          path: fermata/build/outputs/apk/mobile/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload Auto Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fermata-auto-debug
          path: fermata/build/outputs/apk/auto/debug/*.apk
          retention-days: 14
          if-no-files-found: error

  build-release:
    name: Build Release APKs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APKs (Mobile)
        env:
          NO_GS: true
        run: ./gradlew fermata:assembleMobileRelease

      - name: Build Release APKs (Auto)
        env:
          NO_GS: true
        run: ./gradlew fermata:assembleAutoRelease

      - name: Upload Mobile Release APK
        uses: actions/upload-artifact@v4
        with:
          name: fermata-mobile-release
          path: fermata/build/outputs/apk/mobile/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Auto Release APK
        uses: actions/upload-artifact@v4
        with:
          name: fermata-auto-release
          path: fermata/build/outputs/apk/auto/release/*.apk
          retention-days: 30
          if-no-files-found: error
