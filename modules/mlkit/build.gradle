android {
    namespace = 'me.aap.fermata.mlkit'
    defaultConfig {
        versionCode 1
        versionName '1.0'
    }
}

ext {
    addons = [
            [
                    name : 'mlkit_translate',
                    icon : 'translate',
                    class: 'me.aap.fermata.mlkit.MlkitTranslateAddon',
                    hasSettings: false
            ]
    ]
}

dependencies {
    implementation project(':utils')
    implementation project(':fermata')
    implementation libs.androidxAnnotation
    implementation(libs.googleMlkitTranslate) {
        exclude group: 'com.squareup.okio', module: 'okio'
    }
}
